<div class="weather-widget">
  <div class="widget-header">
    <div class="header-left">
      <h2>Weather Forecast Records</h2>
      <!-- Bonus 1: Display the weather forecast count -->
      <p class="count-badge" *ngIf="!loading() && !error()">
        Total Forecast Records: <strong>{{ totalRecords() }}</strong>
      </p>
    </div>
    
    <!-- Bonus 3: Add a Refresh button that reloads the weather data -->
    <button class="refresh-btn" [class.spinning]="loading()" (click)="fetchWeather()" aria-label="Refresh weather data">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67"/>
      </svg>
      Refresh
    </button>
  </div>

  <!-- Loading state -->
  <div class="loading-state" *ngIf="loading()">
    <div class="spinner"></div>
    <p>Loading weather records...</p>
  </div>

  <!-- Error state -->
  <div class="error-state" *ngIf="error()">
    <span class="error-icon">⚠️</span>
    <p>{{ error() }}</p>
    <button class="retry-btn" (click)="fetchWeather()">Retry Connection</button>
  </div>

  <!-- Weather Table (Part 3 UI Requirements) -->
  <div class="table-responsive" *ngIf="!loading() && !error()">
    <table class="weather-table">
      <thead>
        <tr>
          <th>Date</th>
          <th>Temperature (C)</th>
          <th>Temperature (F)</th>
          <th>Summary</th>
        </tr>
      </thead>
      <tbody>
        <!-- Bonus 2: Highlight rows where TemperatureC > 30 using dynamic class binding -->
        <tr *ngFor="let item of forecasts()" [class.hot-highlight]="item.temperatureC > 30">
          <td>
            <span class="cell-date">{{ formatDate(item.date) }}</span>
          </td>
          <td class="temp-cell font-mono">{{ item.temperatureC }}°C</td>
          <td class="temp-cell font-mono">{{ item.temperatureF }}°F</td>
          <td>
            <div class="summary-wrapper">
              <span class="weather-icon">{{ getWeatherIcon(item.summary) }}</span>
              <span class="badge" [ngClass]="getWeatherClass(item.summary)">{{ item.summary }}</span>
            </div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
